<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" width="1200" height="627">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF7F0"/>
      <stop offset="100%" stop-color="#EFEADF"/>
    </linearGradient>
    <linearGradient id="dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="phoneScreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF7F0"/>
      <stop offset="100%" stop-color="#F5F0E6"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="16" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Cream background -->
  <rect width="1200" height="627" fill="url(#bg)"/>

  <!-- Decorative grid dots -->
  <g fill="#0F172A" opacity="0.04">
    <circle cx="60" cy="60" r="2"/><circle cx="120" cy="60" r="2"/><circle cx="180" cy="60" r="2"/>
    <circle cx="60" cy="120" r="2"/><circle cx="120" cy="120" r="2"/><circle cx="180" cy="120" r="2"/>
    <circle cx="1140" cy="567" r="2"/><circle cx="1080" cy="567" r="2"/><circle cx="1020" cy="567" r="2"/>
    <circle cx="1140" cy="507" r="2"/><circle cx="1080" cy="507" r="2"/><circle cx="1020" cy="507" r="2"/>
  </g>

  <!-- Top-left brand bar -->
  <g transform="translate(80 72)">
    <rect width="8" height="24" rx="2" fill="#0D9488"/>
    <text x="20" y="18" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0F172A" letter-spacing="2">
      B2B AI · PRODUCT CASE STUDY
    </text>
  </g>

  <!-- LEFT COLUMN: text content -->
  <g transform="translate(80 130)">
    <!-- Headline -->
    <text font-family="Inter, system-ui, sans-serif" font-size="68" font-weight="800" fill="#0F172A" letter-spacing="-1.5">
      <tspan x="0" y="0">Agentic Mobile</tspan>
    </text>
    <text font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="500" fill="#334155">
      <tspan x="0" y="44">B2B AI Agent Workspace</tspan>
      <tspan x="0" y="78">for Decision-Makers on the Go.</tspan>
    </text>

    <!-- Problem → Solution line -->
    <g transform="translate(0 120)">
      <rect width="560" height="68" rx="12" fill="#FFFFFF" stroke="#E7E5E0"/>
      <text font-family="Inter, system-ui, sans-serif" font-size="14" fill="#475569" font-weight="500">
        <tspan x="20" y="28">Mobile AI tools return walls of text.</tspan>
        <tspan x="20" y="50" fill="#0F172A" font-weight="700">I built generative UI that renders actions instead.</tspan>
      </text>
    </g>

    <!-- Metrics row -->
    <g transform="translate(0 215)">
      <g>
        <rect width="170" height="78" rx="12" fill="#FFFFFF" stroke="#E7E5E0"/>
        <text x="16" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#0D9488" letter-spacing="1.5">TASK VELOCITY</text>
        <text x="16" y="58" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#0F172A">&lt; 15 min</text>
      </g>
      <g transform="translate(190 0)">
        <rect width="170" height="78" rx="12" fill="#FFFFFF" stroke="#E7E5E0"/>
        <text x="16" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#0D9488" letter-spacing="1.5">AGENT RUNS</text>
        <text x="16" y="58" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#0F172A">2+ / session</text>
      </g>
      <g transform="translate(380 0)">
        <rect width="180" height="78" rx="12" fill="#FFFFFF" stroke="#E7E5E0"/>
        <text x="16" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#0D9488" letter-spacing="1.5">ENGAGEMENT</text>
        <text x="16" y="58" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#0F172A">40%+ zero-state</text>
      </g>
    </g>

    <!-- Tech stack pills -->
    <g transform="translate(0 315)" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">
      <g>
        <rect width="90" height="32" rx="8" fill="#FFFFFF" stroke="#E7E5E0"/>
        <text x="45" y="21" text-anchor="middle" fill="#0F172A">Next.js</text>
      </g>
      <g transform="translate(100 0)">
        <rect width="110" height="32" rx="8" fill="#FFFFFF" stroke="#E7E5E0"/>
        <text x="55" y="21" text-anchor="middle" fill="#0369A1">TypeScript</text>
      </g>
      <g transform="translate(220 0)">
        <rect width="95" height="32" rx="8" fill="#FFFFFF" stroke="#E7E5E0"/>
        <text x="47" y="21" text-anchor="middle" fill="#0E7490">Tailwind</text>
      </g>
      <g transform="translate(325 0)">
        <rect width="95" height="32" rx="8" fill="#FFFFFF" stroke="#E7E5E0"/>
        <text x="47" y="21" text-anchor="middle" fill="#047857">OpenAI</text>
      </g>
      <g transform="translate(430 0)">
        <rect width="100" height="32" rx="8" fill="#FFFFFF" stroke="#E7E5E0"/>
        <text x="50" y="21" text-anchor="middle" fill="#15803D">Supabase</text>
      </g>
    </g>

    <!-- Hire Me pill -->
    <g transform="translate(0 380)">
      <rect width="560" height="68" rx="14" fill="url(#dark)"/>
      <circle cx="32" cy="34" r="4" fill="#F59E0B"/>
      <text x="52" y="30" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#FCD34D" letter-spacing="2">AVAILABLE FOR HIRE</text>
      <text x="52" y="53" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="700" fill="#FFFFFF">
        Fractional AI Product Manager &amp; AI Architect
      </text>
    </g>
  </g>

  <!-- RIGHT COLUMN: phone mockup -->
  <g transform="translate(820 90)" filter="url(#shadow)">
    <!-- Phone bezel -->
    <rect width="280" height="560" rx="42" fill="#0F172A"/>
    <!-- Screen -->
    <rect x="10" y="10" width="260" height="540" rx="34" fill="url(#phoneScreen)"/>
    <!-- Notch -->
    <rect x="105" y="10" width="70" height="18" rx="9" fill="#0F172A"/>

    <!-- App header -->
    <g transform="translate(24 52)">
      <rect width="36" height="36" rx="9" fill="#0F172A"/>
      <!-- Sparkle icon -->
      <path d="M18 10 L21 17 L28 18 L21 19 L18 26 L15 19 L8 18 L15 17 Z" fill="#FAF7F0" transform="translate(0 0)"/>
      <text x="48" y="18" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#0F172A">Agentic Mobile</text>
      <circle cx="48" cy="30" r="3" fill="#10B981"/>
      <text x="58" y="33" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#059669" font-weight="600">Online</text>
    </g>

    <!-- Chat: assistant message -->
    <g transform="translate(20 110)">
      <rect width="190" height="80" rx="18" fill="#F5F0E6"/>
      <rect x="0" y="62" width="22" height="18" rx="4" fill="#F5F0E6"/>
      <text font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155" font-weight="500">
        <tspan x="14" y="22">Welcome to Agentic Mobile.</tspan>
        <tspan x="14" y="38">Try &quot;Run daily report&quot; to</tspan>
        <tspan x="14" y="52">see an agentic workflow.</tspan>
      </text>
    </g>

    <!-- User message -->
    <g transform="translate(130 210)">
      <rect width="128" height="34" rx="16" fill="#0F172A"/>
      <text x="14" y="22" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#FFFFFF" font-weight="500">Run daily report</text>
    </g>

    <!-- Agentic workflow card -->
    <g transform="translate(20 260)">
      <rect width="230" height="180" rx="18" fill="#FFFFFF" stroke="#E7E5E0"/>
      <rect x="14" y="14" width="26" height="20" rx="5" fill="#CCFBF1"/>
      <!-- Zap icon -->
      <path d="M24 18 L20 26 L26 26 L22 34" fill="none" stroke="#0F766E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" transform="translate(0 0)"/>
      <text x="48" y="29" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#334155" letter-spacing="1.5">AGENTIC WORKFLOW</text>

      <!-- Step 1 - done -->
      <g transform="translate(14 50)">
        <circle cx="10" cy="10" r="9" fill="#D1FAE5"/>
        <path d="M6 10 L9 13 L14 7" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="26" y="14" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155">Connecting to data sources</text>
      </g>
      <!-- Step 2 - done -->
      <g transform="translate(14 80)">
        <circle cx="10" cy="10" r="9" fill="#D1FAE5"/>
        <path d="M6 10 L9 13 L14 7" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="26" y="14" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155">Fetching CRM records</text>
      </g>
      <!-- Step 3 - active -->
      <g transform="translate(14 110)">
        <circle cx="10" cy="10" r="9" fill="none" stroke="#0D9488" stroke-width="2" stroke-dasharray="6 4"/>
        <text x="26" y="14" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#0F172A">Running analysis...</text>
      </g>
      <!-- Step 4 - pending -->
      <g transform="translate(14 140)">
        <circle cx="10" cy="10" r="9" fill="none" stroke="#CBD5E1" stroke-width="1.5"/>
        <text x="26" y="14" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94A3B8">Generating report</text>
      </g>
    </g>

    <!-- Bottom nav -->
    <g transform="translate(10 505)">
      <rect x="0" y="0" width="260" height="45" rx="0" fill="#FAF7F0" stroke="#E7E5E0" stroke-width="1"/>
      <!-- Chat active -->
      <rect x="30" y="4" width="24" height="2" rx="1" fill="#0D9488"/>
      <text x="42" y="28" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#0D9488">Chat</text>
      <text x="130" y="28" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#94A3B8">Agents</text>
      <text x="218" y="28" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#94A3B8">Vision</text>
    </g>
  </g>

  <!-- Footer attribution -->
  <g transform="translate(80 590)" font-family="Inter, system-ui, sans-serif">
    <text font-size="13" font-weight="600" fill="#334155">
      <tspan>Built by</tspan>
      <tspan dx="6" fill="#0F172A" font-weight="800">Aurimas A. Nausėdas</tspan>
      <tspan dx="8" fill="#94A3B8">·</tspan>
      <tspan dx="8" fill="#0D9488" font-weight="700">agentic.aurimas.io</tspan>
    </text>
  </g>
</svg>
