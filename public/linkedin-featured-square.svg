<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200" role="img" aria-label="Agentic Mobile — B2B AI Agent Workspace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF7F0"/>
      <stop offset="100%" stop-color="#EFEADF"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)"/>

  <g fill="#E7E5E0" opacity="0.7">
    <circle cx="60" cy="40" r="2"/><circle cx="100" cy="60" r="1.5"/><circle cx="40" cy="100" r="1.5"/>
    <circle cx="1140" cy="80" r="2"/><circle cx="1100" cy="50" r="1.5"/><circle cx="1160" cy="120" r="1.5"/>
    <circle cx="60" cy="1140" r="2"/><circle cx="1140" cy="1140" r="2"/>
  </g>

  <!-- HEADER -->
  <g transform="translate(80 70)">
    <rect width="8" height="22" rx="2" fill="#0D9488"/>
    <text x="20" y="17" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#0F172A" letter-spacing="2">B2B AI · MOBILE-FIRST AGENT WORKSPACE</text>
  </g>

  <text x="80" y="180" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="800" fill="#0F172A" letter-spacing="-1.5">Agentic Mobile</text>
  <text x="80" y="222" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#334155">An AI agent workspace for decision-makers on the go.</text>

  <!-- LEFT: feature pills 6 (245 wide, 44 tall, gap 12) -->
  <g transform="translate(80 270)" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">
    <g><rect width="490" height="44" rx="22" fill="#FFFFFF" stroke="#E7E5E0"/><circle cx="22" cy="22" r="4.5" fill="#0D9488"/><text x="38" y="27" fill="#0F172A">Streaming GPT-4o-mini chat</text></g>
    <g transform="translate(0 56)"><rect width="490" height="44" rx="22" fill="#FFFFFF" stroke="#E7E5E0"/><circle cx="22" cy="22" r="4.5" fill="#DC2626"/><text x="38" y="27" fill="#0F172A">Voice input (Web Speech API)</text></g>
    <g transform="translate(0 112)"><rect width="490" height="44" rx="22" fill="#FFFFFF" stroke="#E7E5E0"/><circle cx="22" cy="22" r="4.5" fill="#F59E0B"/><text x="38" y="27" fill="#0F172A">In-chat approval cards</text></g>
    <g transform="translate(0 168)"><rect width="490" height="44" rx="22" fill="#FFFFFF" stroke="#E7E5E0"/><circle cx="22" cy="22" r="4.5" fill="#7C3AED"/><text x="38" y="27" fill="#0F172A">9 agent templates · 7 integrations</text></g>
    <g transform="translate(0 224)"><rect width="490" height="44" rx="22" fill="#FFFFFF" stroke="#E7E5E0"/><circle cx="22" cy="22" r="4.5" fill="#15803D"/><text x="38" y="27" fill="#0F172A">Inbox approval queue with badges</text></g>
    <g transform="translate(0 280)"><rect width="490" height="44" rx="22" fill="#FFFFFF" stroke="#E7E5E0"/><circle cx="22" cy="22" r="4.5" fill="#0369A1"/><text x="38" y="27" fill="#0F172A">Generative UI rendered as actions</text></g>
  </g>

  <!-- LEFT: 3 metrics cards -->
  <g transform="translate(80 620)">
    <g><rect width="155" height="92" rx="14" fill="#FFFFFF" stroke="#E7E5E0"/>
       <text x="16" y="28" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#0D9488" letter-spacing="1.5">TIME-TO-APPROVAL</text>
       <text x="16" y="64" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="800" fill="#0F172A">&lt; 15 min</text>
       <text x="16" y="82" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748B">from hours</text></g>
    <g transform="translate(168 0)"><rect width="155" height="92" rx="14" fill="#FFFFFF" stroke="#E7E5E0"/>
       <text x="16" y="28" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#0D9488" letter-spacing="1.5">TEMPLATES</text>
       <text x="16" y="64" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="800" fill="#0F172A">9 ready</text>
       <text x="16" y="82" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748B">one-click install</text></g>
    <g transform="translate(335 0)"><rect width="155" height="92" rx="14" fill="#FFFFFF" stroke="#E7E5E0"/>
       <text x="16" y="28" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#0D9488" letter-spacing="1.5">INTEGRATIONS</text>
       <text x="16" y="64" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="800" fill="#0F172A">7 wired</text>
       <text x="16" y="82" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748B">Slack · Gmail · CRM</text></g>
  </g>

  <!-- LEFT: Hire-me ribbon -->
  <g transform="translate(80 740)">
    <rect width="490" height="78" rx="16" fill="url(#dark)"/>
    <circle cx="32" cy="39" r="5" fill="#F59E0B"/>
    <text x="52" y="34" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#FCD34D" letter-spacing="2">AVAILABLE FOR HIRE</text>
    <text x="52" y="58" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">Fractional AI PM &amp; AI Architect</text>
  </g>

  <!-- LEFT: CTA -->
  <g transform="translate(80 838)">
    <text font-family="Inter, system-ui, sans-serif" font-size="14" fill="#475569">
      <tspan font-weight="700" fill="#0F172A">Try the live prototype:</tspan>
      <tspan dx="8" fill="#0D9488" font-weight="700">agentic.aurimas.io</tspan>
    </text>
    <text x="0" y="22" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#64748B">Every button is wired. Real OpenAI streaming. Real voice transcription. Real approvals.</text>
  </g>

  <!-- RIGHT COLUMN: large phone mockup showing Inbox -->
  <g transform="translate(700 270)">
    <!-- Phone frame -->
    <rect x="0" y="0" width="420" height="780" rx="56" fill="url(#phone)"/>
    <rect x="8" y="8" width="404" height="764" rx="48" fill="#FAF7F0"/>
    <rect x="160" y="8" width="100" height="20" rx="10" fill="#0F172A"/>

    <g clip-path="inset(0 round 48px)">
      <!-- Header -->
      <g transform="translate(28 50)">
        <rect width="48" height="48" rx="12" fill="url(#dark)"/>
        <path d="M18 16 L24 16 L24 22 L26 22 L26 24 L24 24 L24 30 L18 30 L18 24 L16 24 L16 22 L18 22 Z" fill="#FFFFFF"/>
        <text x="62" y="22" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#0F172A">Inbox</text>
        <text x="62" y="40" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748B">3 pending decisions</text>
      </g>

      <!-- Filter chips -->
      <g transform="translate(28 116)" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">
        <g><rect width="92" height="28" rx="8" fill="#0F172A"/><text x="46" y="18" text-anchor="middle" fill="#FFFFFF">Pending · 3</text></g>
        <g transform="translate(100 0)"><rect width="40" height="28" rx="8" fill="#FFFFFF" stroke="#E7E5E0"/><text x="20" y="18" text-anchor="middle" fill="#475569">All</text></g>
        <g transform="translate(148 0)"><rect width="80" height="28" rx="8" fill="#FFFFFF" stroke="#E7E5E0"/><text x="40" y="18" text-anchor="middle" fill="#475569">Resolved</text></g>
      </g>

      <!-- Approval card 1: Q3 budget HIGH -->
      <g transform="translate(28 162)">
        <rect width="364" height="170" rx="16" fill="#FFFFFF" stroke="#FCD34D" stroke-width="2"/>
        <text x="20" y="30" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#64748B" letter-spacing="1.5">PIPELINE STANDUP</text>
        <g transform="translate(170 16)">
          <rect width="42" height="16" rx="4" fill="#FEF3C7"/>
          <text x="21" y="12" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#92400E">HIGH</text>
        </g>
        <text x="20" y="56" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#0F172A">Approve Q3 marketing budget</text>
        <text x="20" y="76" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#0F172A">$284,000</text>
        <text x="20" y="100" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569">12% over Q2. CFO pre-reviewed.</text>
        <text x="20" y="118" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569">ROI projection 3.4x.</text>
        <g transform="translate(20 130)">
          <rect width="158" height="32" rx="8" fill="#F1F5F9"/>
          <text x="79" y="20" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#475569">Reject</text>
        </g>
        <g transform="translate(186 130)">
          <rect width="158" height="32" rx="8" fill="#059669"/>
          <text x="79" y="20" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Approve</text>
        </g>
      </g>

      <!-- Approval card 2: Datadog -->
      <g transform="translate(28 346)">
        <rect width="364" height="130" rx="16" fill="#FFFFFF" stroke="#E7E5E0"/>
        <text x="20" y="30" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#64748B" letter-spacing="1.5">COMPLIANCE AGENT</text>
        <text x="20" y="56" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#0F172A">Datadog vendor renewal</text>
        <text x="20" y="78" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569">$48,200/yr · auto-renews 6 days</text>
        <g transform="translate(20 90)">
          <rect width="158" height="28" rx="8" fill="#F1F5F9"/>
          <text x="79" y="18" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#475569">Reject</text>
        </g>
        <g transform="translate(186 90)">
          <rect width="158" height="28" rx="8" fill="#059669"/>
          <text x="79" y="18" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Approve</text>
        </g>
      </g>

      <!-- Approval card 3: Acme HIGH -->
      <g transform="translate(28 490)">
        <rect width="364" height="100" rx="16" fill="#FFFFFF" stroke="#FCD34D" stroke-width="2"/>
        <text x="20" y="30" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#64748B" letter-spacing="1.5">DEAL RISK ANALYZER</text>
        <g transform="translate(190 16)">
          <rect width="42" height="16" rx="4" fill="#FEF3C7"/>
          <text x="21" y="12" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#92400E">HIGH</text>
        </g>
        <text x="20" y="56" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#0F172A">Stalled — Acme Corp ($120k)</text>
        <text x="20" y="78" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569">No prospect activity for 14 days.</text>
      </g>

      <!-- Bottom nav -->
      <g transform="translate(0 700)">
        <rect width="420" height="76" fill="#FAF7F0"/>
        <line x1="0" y1="0" x2="420" y2="0" stroke="#E7E5E0"/>
        <!-- Chat -->
        <text x="52" y="42" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94A3B8">Chat</text>
        <!-- Inbox active -->
        <g transform="translate(157 8)">
          <rect x="-16" y="0" width="32" height="3" rx="1.5" fill="#0D9488"/>
          <text x="0" y="34" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#0D9488">Inbox</text>
          <circle cx="14" cy="14" r="9" fill="#F59E0B"/>
          <text x="14" y="18" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="800" fill="#FFFFFF">3</text>
        </g>
        <!-- Agents -->
        <text x="262" y="42" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94A3B8">Agents</text>
        <!-- Vision -->
        <text x="367" y="42" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94A3B8">Vision</text>
      </g>
    </g>
  </g>

  <!-- Footer attribution -->
  <g transform="translate(80 1130)" font-family="Inter, system-ui, sans-serif">
    <text font-size="13" font-weight="600" fill="#334155">
      <tspan>Built by</tspan>
      <tspan dx="8" fill="#0F172A" font-weight="800">Aurimas A. Nausėdas</tspan>
      <tspan dx="10" fill="#94A3B8">·</tspan>
      <tspan dx="10" fill="#0D9488" font-weight="700">agentic.aurimas.io</tspan>
    </text>
    <text y="22" font-size="11" fill="#64748B">Next.js · TypeScript · Tailwind · OpenAI · Supabase · Vercel</text>
  </g>
</svg>
